name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK platforms and build tools
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Inject API keys
      run: |
        cat > app/src/main/assets/config.json << 'CONFIGEOF'
        {
          "api_keys": {
            "openrouter": "${{ secrets.OPENROUTER_KEY }}",
            "groq": "${{ secrets.GROQ_KEY }}",
            "gemini": "${{ secrets.GEMINI_KEY }}",
            "deepseek": "${{ secrets.DEEPSEEK_KEY }}",
            "mistral": "${{ secrets.MISTRAL_KEY }}",
            "huggingface": "${{ secrets.HF_KEY }}",
            "nvidia": "${{ secrets.NVIDIA_KEY }}"
          }
        }
        CONFIGEOF

    - name: Build debug APK
      run: gradle assembleDebug --no-daemon

    - name: Rename APK
      run: |
        mkdir -p build
        cp app/build/outputs/apk/debug/app-debug.apk build/eyeplus-v1.5.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: eyeplus-apk
        path: build/eyeplus-v1.5.apk
