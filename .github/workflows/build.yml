name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK platforms and build tools
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Inject API keys
      run: |
        cat > app/src/main/assets/config.json << 'CONFIGEOF'
        {
          "api_keys": {
            "openrouter": "${{ secrets.OPENROUTER_KEY }}",
            "groq": "${{ secrets.GROQ_KEY }}",
            "gemini": "${{ secrets.GEMINI_KEY }}",
            "deepseek": "${{ secrets.DEEPSEEK_KEY }}",
            "mistral": "${{ secrets.MISTRAL_KEY }}",
            "huggingface": "${{ secrets.HF_KEY }}",
            "nvidia": "${{ secrets.NVIDIA_KEY }}"
          }
        }
        CONFIGEOF

    - name: Build APK
      run: |
        set -e
        SDK=$ANDROID_HOME
        BT=$SDK/build-tools/34.0.0
        PLATFORM=$SDK/platforms/android-34/android.jar
        SRC=app/src/main
        BUILD=build
        ROOT=$PWD

        rm -rf $BUILD
        mkdir -p $BUILD/gen $BUILD/obj/classes $BUILD/dex $BUILD/staging

        echo "=== AAPT2 compile ==="
        find $SRC/res -name "*.xml" -exec $BT/aapt2 compile {} -o $BUILD/obj/ \;
        find $SRC/res -name "*.png" -exec $BT/aapt2 compile {} -o $BUILD/obj/ \; 2>/dev/null || true

        echo "=== AAPT2 link ==="
        $BT/aapt2 link -I $PLATFORM \
            --manifest $SRC/AndroidManifest.xml \
            --java $BUILD/gen \
            --min-sdk-version 24 \
            --target-sdk-version 34 \
            -A $SRC/assets \
            -o $BUILD/staging/app-unsigned.apk \
            $(find $BUILD/obj -name "*.flat")

        echo "=== Compile Java ==="
        find $SRC/java $BUILD/gen -name "*.java" > $BUILD/srcs.txt
        javac -source 17 -target 17 -classpath $PLATFORM -d $BUILD/obj/classes @$BUILD/srcs.txt

        echo "=== DEX ==="
        find $BUILD/obj/classes -name "*.class" > $BUILD/classes.txt
        $BT/d8 --output $BUILD/dex --lib $PLATFORM $(cat $BUILD/classes.txt)
        ls -la $BUILD/dex/

        echo "=== Add DEX to APK (no repackage) ==="
        cp $BUILD/staging/app-unsigned.apk $BUILD/staging/with-dex.apk
        cd $BUILD/dex
        zip -q -0 $ROOT/$BUILD/staging/with-dex.apk classes.dex
        cd $ROOT

        echo "=== Sign ==="
        keytool -genkeypair -v -keystore $BUILD/debug.keystore -alias eyeplus \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=EyePlus,OU=Dev,O=EyePlus,L=Prague,ST=CR,C=CZ" 2>/dev/null

        echo "=== Zipalign ==="
        $BT/zipalign -f 4 $BUILD/staging/with-dex.apk $BUILD/staging/aligned.apk

        $BT/apksigner sign \
            --ks $BUILD/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out $BUILD/eyeplus-v1.5.apk \
            $BUILD/staging/aligned.apk

        $BT/apksigner verify $BUILD/eyeplus-v1.5.apk
        echo "=== BUILD OK ==="
        ls -la $BUILD/eyeplus-v1.5.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: eyeplus-apk
        path: build/eyeplus-v1.5.apk
