plugins {
    id 'com.android.application'
}

android {
    namespace 'com.eyeplus.camera'
    compileSdk 34

    defaultConfig {
        applicationId "com.eyeplus.camera"
        minSdk 24
        targetSdk 34
        versionCode 5
        versionName "1.5"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
